  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: frontend-deployment
    namespace: chat-app
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: frontend
    template:
      metadata:
        name: frontend-dep-pod
        labels:
         app: frontend
      spec:
        containers:
        - name: frontend-dep-pod
          image: shaktirathore/chat-app-frontend
          ports:
            - containerPort: 80
          env:
          - name: NODE_ENV
            value: production
